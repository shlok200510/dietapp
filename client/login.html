<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AyurCare - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2b593f;
            --primary-light: #447a5d;
            --primary-dark: #1b3d29;
            --accent: #d89f5b;
            --bg-color: #f4f9f5;
            --card-bg: #ffffff;
            --text-main: #2c3e35;
            --text-muted: #6b8273;
            --border: #e0ebe4;
            --error: #721c24;
            --error-bg: #f8d7da;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(circle at 100% 0%, #e3f0e8 0%, transparent 50%),
                              radial-gradient(circle at 0% 100%, #e3f0e8 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(43, 89, 63, 0.08);
            overflow: hidden;
            position: relative;
            padding: 3.5rem;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .brand-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .brand-header h1 span {
            color: var(--accent);
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #fafcfa;
            font-size: 1.05rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input:hover {
            border-color: #c8d9ce;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(43, 89, 63, 0.1);
        }

        .submit-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .submit-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(43, 89, 63, 0.2);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .alert-error {
            display: none;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            animation: slideDown 0.4s ease;
            font-size: 0.95rem;
            align-items: center;
            gap: 10px;
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid #f5c6cb;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand-header">
        <h1>Ayur<span>Care</span></h1>
        <p>Admin Portal Login</p>
    </div>

    <div id="errorMsg" class="alert-error">
        <span>❌</span> Invalid username or password.
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">
            Sign In <span>→</span>
        </button>
    </form>
</div>

<script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");
    
    // Hardcoded credentials for now as per requirement
    const CORRECT_USER = "admin123";
    const CORRECT_PASS = "Admin@123";

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        
        // Hide previous errors
        errorMsg.style.display = "none";
        
        // Add loading state
        const originalText = loginBtn.innerHTML;
        loginBtn.innerHTML = "Authenticating... <span>⏳</span>";
        loginBtn.style.opacity = "0.8";
        loginBtn.disabled = true;

        const userVal = document.getElementById("username").value.trim();
        const passVal = document.getElementById("password").value;

        // Simulate a slight network delay for better UX feel
        setTimeout(() => {
            if(userVal === CORRECT_USER && passVal === CORRECT_PASS) {
                // Success - redirect to dashboard
                window.location.href = "dashboard.html";
            } else {
                // Failure
                errorMsg.style.display = "flex";
                
                // Shake effect on the container (optional but nice)
                const container = document.querySelector('.login-container');
                container.style.transform = "translateX(5px)";
                setTimeout(() => container.style.transform = "translateX(-5px)", 100);
                setTimeout(() => container.style.transform = "translateX(5px)", 200);
                setTimeout(() => container.style.transform = "translateX(0)", 300);
                
                // Clear password field on fail
                document.getElementById("password").value = "";
                document.getElementById("password").focus();

                // Restore button
                loginBtn.innerHTML = originalText;
                loginBtn.style.opacity = "1";
                loginBtn.disabled = false;
            }
        }, 500);
    });
</script>

</body>
</html>
