<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AyurCare - Patient Registration</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(135deg,#e7f5ec,#f6fbf8);
}

/* Header */
.header{
    background:#2f7a4b;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    letter-spacing:1px;
    font-weight:600;
}

.container{
    width:500px;
    margin:30px auto;
    background:white;
    padding:25px 30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.form-title{
    text-align:center;
    margin-bottom:20px;
    color:#2f7a4b;
    font-size:24px;
    font-weight:600;
}

label{
    display:block;
    margin-top:14px;
    margin-bottom:6px;
    font-weight:500;
    color:#333;
}

input, textarea{
    width:100%;
    padding:11px;
    border-radius:8px;
    border:1px solid #cfd8d3;
    font-size:14px;
}

input:focus, textarea:focus{
    outline:none;
    border-color:#2f7a4b;
    box-shadow:0 0 4px rgba(47,122,75,0.3);
}

textarea{
    resize:none;
    height:70px;
}

button{
    width:100%;
    margin-top:22px;
    padding:13px;
    background:#2f7a4b;
    border:none;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

button:hover{
    background:#25633d;
}

.success{
    display:none;
    margin-top:15px;
    padding:10px;
    background:#d4edda;
    color:#155724;
    border-radius:6px;
    text-align:center;
}

.error{
    display:none;
    margin-top:15px;
    padding:10px;
    background:#f8d7da;
    color:#721c24;
    border-radius:6px;
    text-align:center;
}
</style>

</head>

<body>

<div class="header">
    AyurCare Hospital Management System
</div>

<div class="container">
    <div class="form-title">Patient Registration (Admin)</div>

```
<form id="patientForm">

    <label>Full Name</label>
    <input type="text" id="name" required>

    <label>Age</label>
    <input type="number" id="age" required>

    <label>Address</label>
    <textarea id="address" required></textarea>

    <label>Phone Number</label>
    <input type="text" id="phone" required>

    <label>Treatment Plan</label>
    <input type="text" id="treatmentPlan" required>

    <label>Room Number</label>
    <input type="text" id="roomNumber" required>

    <label>Emergency Contact</label>
    <input type="text" id="emergencyContact" required>

    <label>Allergens (if any)</label>
    <input type="text" id="allergens">

    <button type="submit">Register Patient</button>
</form>

<div class="success" id="successMsg">
    Patient registered successfully!
</div>

<div class="error" id="errorMsg">
    Failed to register patient. Check backend server.
</div>
```

</div>

<script>
const form = document.getElementById("patientForm");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    const patientData = {
        name: document.getElementById("name").value,
        age: parseInt(document.getElementById("age").value),
        address: document.getElementById("address").value,
        phone: document.getElementById("phone").value,
        treatmentPlan: document.getElementById("treatmentPlan").value,
        roomNumber: document.getElementById("roomNumber").value,
        emergencyContact: document.getElementById("emergencyContact").value,
        allergens: document.getElementById("allergens").value
    };

    try {
        const res = await fetch("http://localhost:5000/api/patients/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patientData)
        });

        if(!res.ok) throw new Error();

        document.getElementById("successMsg").style.display="block";
        document.getElementById("errorMsg").style.display="none";
        form.reset();

    } catch(err) {
        document.getElementById("errorMsg").style.display="block";
        document.getElementById("successMsg").style.display="none";
    }
});
</script>

</body>
</html>
